# Gate: a PR that changes a PUBLISHED package's source must include a
# changeset (so version + changelog can't silently drift from what shipped).
# Covers @statorjs/stator, @statorjs/language-server, create-stator.
# The VS Code extension has its OWN, tighter gate (extension-bundle-gate).
name: Require changeset

on:
  pull_request:
    paths:
      - 'packages/stator/src/**'
      - 'packages/language-server/src/**'
      - 'packages/create-stator/**'

jobs:
  require-changeset:
    name: require-changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a changeset for each changed published package
        run: |
          changed="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          # Concatenate the PR's changesets (skip README/config).
          notes="$(cat .changeset/*.md 2>/dev/null | grep -v -e '^# ' || true)"
          fail=0
          check() { # $1 = path regex, $2 = package name
            if echo "$changed" | grep -qE "$1"; then
              if ! echo "$notes" | grep -qE "[\"']?$2[\"']?[[:space:]]*:"; then
                echo "::error::changed $2 but no changeset covers it — run \`pnpm changeset\`"
                fail=1
              fi
            fi
          }
          check '^packages/stator/src/'          '@statorjs/stator'
          check '^packages/language-server/src/' '@statorjs/language-server'
          check '^packages/create-stator/'       'create-stator'
          [ "$fail" = 0 ] && echo "changeset coverage OK"
          exit $fail
