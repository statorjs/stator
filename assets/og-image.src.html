<!DOCTYPE html>
<!--
  Source for apps/landing/og-image.png (1200×630). Lives in assets/ so
  it isn't published with the site. Regenerate from the repo root with:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      - -headless - -screenshot=apps/landing/og-image.png \
      - -window-size=1200,630 - -hide-scrollbars \
      "file://$PWD/assets/og-image.src.html"
  (remove the space in the flag dashes — HTML comments can't contain "--")
  Uses system monospace on purpose: headless renderers don't load web fonts.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1200px; height: 630px; overflow: hidden; }

  body {
    position: relative;
    background: #0d1218;
    font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Subtle engineering grid, matching the site's .grid-bg */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(232, 226, 213, 0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(232, 226, 213, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: 24px 21px; /* center the grid on the canvas */
  }

  /* Soft copper glow behind the tile */
  .glow {
    position: absolute;
    left: 50%; top: 218px;
    width: 640px; height: 640px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(224, 138, 76, 0.16) 0%,
      rgba(224, 138, 76, 0.05) 38%,
      transparent 68%);
  }

  .tile {
    position: relative;
    width: 208px; height: 208px;
    background: #131a22;
    border: 1px solid rgba(232, 226, 213, 0.14);
    border-radius: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 90px rgba(224, 138, 76, 0.14),
      inset 0 1px 0 rgba(232, 226, 213, 0.07);
  }

  .tile svg { width: 128px; height: 128px; display: block; }

  .wordmark {
    position: relative;
    margin-top: 56px;
    font-size: 58px;
    font-weight: 700;
    letter-spacing: 0.34em;
    text-indent: 0.34em; /* balance the trailing letter-space */
    color: #e8e2d5;
  }

  .tagline {
    position: relative;
    margin-top: 26px;
    font-size: 25px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #95a0ad;
  }

  .tagline .accent { color: #e08a4c; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="tile">
    <!-- The stator mark from favicon.svg: ring, six inward poles, rotor.
         Ring and poles in ink; the rotor is the one copper detail. -->
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="11.6" fill="none" stroke="#e8e2d5" stroke-width="3.8"/>
      <g fill="#e8e2d5">
        <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5"/>
        <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(60 16 16)"/>
        <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(120 16 16)"/>
        <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(180 16 16)"/>
        <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(240 16 16)"/>
        <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(300 16 16)"/>
      </g>
      <circle cx="16" cy="16" r="3.1" fill="#e08a4c"/>
    </svg>
  </div>

  <div class="wordmark">STATOR</div>

  <div class="tagline">Render HTML where your state <span class="accent">lives.</span></div>
</body>
</html>
