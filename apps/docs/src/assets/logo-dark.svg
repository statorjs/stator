<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Stator</title>
  <!-- Stator & rotor: stationary ring with inward poles, air gap, rotor.
       The frame drives the rotor without touching it. -->
  <circle cx="16" cy="16" r="11.6" fill="none" stroke="#eae8e2" stroke-width="3.8"/>
  <g fill="#eae8e2">
    <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5"/>
    <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(60 16 16)"/>
    <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(120 16 16)"/>
    <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(180 16 16)"/>
    <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(240 16 16)"/>
    <rect x="14.3" y="6" width="3.4" height="3.7" rx="0.5" transform="rotate(300 16 16)"/>
    <circle cx="16" cy="16" r="3.1"/>
  </g>
</svg>
