# fly.toml app configuration file generated for statorjs-demo on 2026-05-18T09:12:19-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'statorjs-demo'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  # SSE connection registry is in-process (per Fly machine). Until V1 adds
  # Redis pub/sub for cross-machine fan-out, run exactly one machine so
  # every POST and every SSE connection land on the same process.
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
