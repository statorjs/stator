# Fly.io deploy config for the stator example app.
#
# Replace `app = "..."` with the name fly assigns (or your preferred name)
# after `fly launch`. Region is set to ord for a generic US default; pick
# something close to you on first deploy.
#
# Critical for SSE: machines must NOT auto-stop. `auto_stop_machines = "off"`
# below ensures the process keeps running so open EventSource connections
# stay alive. Scale-to-zero would close every live admin tab on idle.

app = "stator-demo"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # SESSION_TTL_SECONDS = "86400"   # default 24h; override here if needed
  # LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Secrets to set before deploy:
#   fly secrets set REDIS_URL='rediss://default:<pw>@<host>:6379'
#
# Without REDIS_URL set, the app falls back to InMemoryStore and sessions
# are wiped on every deploy — fine for smoke-testing, not for a live demo.
